<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 512 512"
     width="512"
     height="512">

    <defs>
        <linearGradient id="houseGradient" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#3B82F6"/>
            <stop offset="100%" stop-color="#2563EB"/>
        </linearGradient>

        <linearGradient id="serverGradient" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#4B5563"/>
            <stop offset="100%" stop-color="#1F2937"/>
        </linearGradient>
    </defs>

    <!-- House -->
    <path
        d="M70 220 L256 70 L442 220 V420 H70 Z"
        fill="url(#houseGradient)"
        stroke="#1E40AF"
        stroke-width="12"
        stroke-linejoin="round"/>

    <!-- Roof -->
    <path
        d="M45 235 L256 55 L467 235"
        fill="none"
        stroke="#1E40AF"
        stroke-width="18"
        stroke-linecap="round"/>

    <!-- Server Rack -->
    <rect
        x="145"
        y="205"
        rx="16"
        width="222"
        height="58"
        fill="url(#serverGradient)"/>

    <rect
        x="145"
        y="275"
        rx="16"
        width="222"
        height="58"
        fill="url(#serverGradient)"/>

    <!-- LEDs -->
    <circle cx="175" cy="234" r="8" fill="#22C55E"/>
    <circle cx="200" cy="234" r="8" fill="#FACC15"/>

    <circle cx="175" cy="304" r="8" fill="#22C55E"/>
    <circle cx="200" cy="304" r="8" fill="#60A5FA"/>

    <!-- Hub -->
    <circle
        cx="256"
        cy="175"
        r="14"
        fill="#374151"/>

    <!-- Network -->
    <line x1="256" y1="175" x2="256" y2="205"
          stroke="#374151"
          stroke-width="8"/>

    <line x1="256" y1="175" x2="220" y2="150"
          stroke="#374151"
          stroke-width="8"/>

    <line x1="256" y1="175" x2="292" y2="150"
          stroke="#374151"
          stroke-width="8"/>

    <circle cx="220" cy="150" r="9" fill="#22C55E"/>
    <circle cx="292" cy="150" r="9" fill="#60A5FA"/>
    <circle cx="256" cy="135" r="9" fill="#F97316"/>
</svg>